<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --surface: #ffffff;
      --accent: #ffffff;
      --text: #ffffff;
      --muted: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* Animated ring */
    .ring-wrap {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .ring-1 {
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      animation: spin 1.4s linear infinite;
    }

    .ring-2 {
      inset: 14px;
      border-bottom-color: #ffffff;
      border-left-color: #ffffff;
      animation: spin 2s linear infinite reverse;
    }

    .ring-3 {
      inset: 28px;
      border-top-color: var(--accent);
      opacity: 0.4;
      animation: spin 0.9s linear infinite;
    }

    .ring-dot {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-dot::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Text */
    .label {
      text-align: center;
    }

    .label h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      animation: fadeIn 0.8s ease forwards;
    }

    .label .status {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      animation: fadeIn 1s ease 0.2s forwards;
      opacity: 0;
    }

    .label .status span {
      color: var(--accent);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Progress bar */
    .progress-wrap {
      width: 260px;
      height: 2px;
      background: #808080;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 10px var(--accent);
      animation: load 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 90%; }
      100% { width: 100%; }
    }

    /* Button — hidden until load completes */
    .btn-wrap {
      opacity: 0;
      transform: translateY(10px);
      animation: revealBtn 0.5s ease 2.4s forwards;
    }

    @keyframes revealBtn {
      to { opacity: 1; transform: translateY(0); }
    }

    .open-btn {
      background: var(--accent);
      color: #000000;
      border: none;
      padding: 14px 48px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 var(--accent);
    }

    .open-btn:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px #000000;
    }

    .open-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring-dot"></div>
    </div>

    <div class="label">
      <h1>Initializing</h1>
      <div class="status">Getting <span>Ready</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="btn-wrap">
      <button class="open-btn" onclick="openSite()">Open</button>
    </div>
  </div>

  <script>
    function openSite() {
      const url = "https://cdn.speedstarsunblocked.net/index.html";
      const popup = window.open("about:blank", "_blank");
      popup.document.open();
      popup.document.write(`
        <!DOCTYPE html>
        <html>
          <head>
            <title>Home</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              html, body { width: 100%; height: 100%; overflow: hidden; }
              iframe { width: 100vw; height: 100vh; border: none; display: block; }
            </style>
          </head>
          <body>
            <iframe src="${url}" allowfullscreen></iframe>
          </body>
        </html>
      `);
      popup.document.close();
    }
  </script>
</body>
</html>
